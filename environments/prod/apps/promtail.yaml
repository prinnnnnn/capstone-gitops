apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: platform
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  sources:

    - repoURL: https://grafana.github.io/helm-charts
      chart: promtail
      targetRevision: 6.16.0
      helm:
        valueFiles:
          - $values/helm-values/promtail/values.yaml

    - repoURL: https://github.com/prinnnnnn/capstone-gitops.git
      targetRevision: main
      ref: values

  syncPolicy:
    automated:
      prune: true      
      selfHeal: false     
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true