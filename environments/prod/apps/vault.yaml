apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/part-of: platform
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: vault

  sources:

    # - repoURL: https://metallb.github.io/metallb
    #   chart: metallb
    #   targetRevision: 0.14.6
    #   helm:
    #     valueFiles:
    #       - $values/helm-values/metallb/values.yaml

    # - repoURL: https://github.com/prinnnnnn/capstone-gitops.git
    #   targetRevision: main
    #   ref: values

    - repoURL: https://github.com/prinnnnnn/capstone-gitops.git
      targetRevision: main
      path: infrastructure/vault/

  syncPolicy:
    automated:
      prune: true      
      selfHeal: true     
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true