loki:
  loki:
    storage:
      type: filesystem

    commonConfig:
      replication_factor: 1

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    ruler:
      storage:
        type: local
        local:
          directory: /var/loki/rules

    compactor:
      working_directory: /var/loki/compactor
      shared_store: filesystem
  
  image:
    registry: docker.io
    repository: grafana/loki
    tag: 3.0.0

  storage_config:
    aws: null
    boltdb_shipper:
      active_index_directory: /var/loki/index
      cache_location: /var/loki/index_cache
    tsdb_shipper:
      active_index_directory: /var/loki/tsdb-index
      cache_location: /var/loki/tsdb-cache
    filesystem:
      directory: /var/loki/chunks

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
      storageClass: "ceph-monitoring"

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push

grafana:
  enabled: false

prometheus:
  enabled: false