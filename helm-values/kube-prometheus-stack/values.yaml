global:
  rbac:
    create: true

grafana:
  nodeSelector:
    monitoring: enabled
  enabled: true

  admin:
    existingSecret: "grafana-secret"
    userKey: adminUser
    passwordKey: adminPassword

  service:
    type: ClusterIP

  ingress:
    enabled: false
    ingressClassName: nginx
    paths:
      - /
    pathType: Prefix

    # TLS example (enable later)
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.example.local

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  additionalDataSources: []

  grafana.ini:
    users:
      allow_sign_up: false
    auth.anonymous:
      enabled: false

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers: []

  sidecar:
    dashboards:
      enabled: true

  persistence:
    enabled: true
    type: sts
    storageClassName: "ceph-monitoring"
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    finalizers:
      - kubernetes.io/pvc-protection

  extraConfigmapMounts:
    - name: grafana-provisioning
      mountPath: /etc/grafana/provisioning/users
      configMap: grafana-users

prometheus:
  enabled: true

  prometheusSpec:
    replicas: 1
    retention: 15d
    retentionSize: 20GB

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-monitoring
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1
        memory: 2Gi

    nodeSelector:
      monitoring: enabled

    tolerations: []

alertmanager:
  enabled: true
  config:
    route:
      receiver: 'discord'
    receivers:
      - name: 'discord'
        webhook_configs:
          - url: http://alertmanager-discord.monitoring.svc.cluster.local:9094
            send_resolved: true'

  alertmanagerSpec:
    nodeSelector:
      monitoring: enabled
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: ceph-monitoring
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

kubeStateMetrics:
  nodeSelector:
    monitoring: enabled
  enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

nodeExporter:
  nodeSelector:
    monitoring: enabled
  enabled: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
 
