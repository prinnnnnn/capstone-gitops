apiVersion: v1
kind: Service
metadata:
  name: grafana-loadbalancer-service
  namespace: monitoring                      
  annotations:
    metallb.io/ip-allocated-from-pool: default-ip-pool   
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: grafana                
  ports:
    - name: http
      protocol: TCP
      port: 80                           
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-loadbalancer-service
  namespace: monitoring                      
  annotations:
    metallb.io/ip-allocated-from-pool: default-ip-pool   
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: alertmanager            
  ports:
    - name: http
      protocol: TCP
      port: 80                           
      targetPort: 9093
---
apiVersion: v1
kind: Service
metadata:
  name: loki-loadbalancer-service
  namespace: monitoring                      
  annotations:
    metallb.io/ip-allocated-from-pool: default-ip-pool   
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/component: single-binary
    app.kubernetes.io/instance: loki
    app.kubernetes.io/name: loki          
  ports:
    - name: http
      protocol: TCP
      port: 3100                           
      targetPort: 3100