apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: grafana-vault-auth
  namespace: monitoring
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: grafana
    serviceAccount: kube-prometheus-stack-grafana
    tokenExpirationSeconds: 3600
  vaultConnectionRef: vault-secrets-operator/vault-connection
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: grafana-secret
  namespace: monitoring
spec:
  type: kv-v2
  mount: secret
  path: grafana
  destination:
    name: grafana-secret
    create: true
  refreshAfter: 30s
  vaultAuthRef: grafana-vault-auth