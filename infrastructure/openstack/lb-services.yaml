apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-mgr-lb-service
  namespace: openstack                      
  annotations:
    metallb.io/ip-allocated-from-pool: public   
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: rabbitmq-mgr           
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-lb-service
  namespace: openstack                      
  annotations:
    metallb.io/ip-allocated-from-pool: public   
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: mariadb           
  ports:
    - name: http
      protocol: TCP
      port: 3306
      targetPort: 3306